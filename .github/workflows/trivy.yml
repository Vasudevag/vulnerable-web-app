name: Trivy Scan

on:
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Trivy Scan
        run: |
          docker run --rm \
          -v $(pwd):/app \
          aquasec/trivy fs /app
